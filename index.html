<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Pilih Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        header { text-align: center; margin-bottom: 3rem; }
        header h1 { font-size: 2.5rem; color: var(--primary-color); }

        .container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        .menu-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 250px;
            transition: transform 0.3s;
            text-decoration: none;
            color: inherit;
        }

        .menu-card:hover { transform: translateY(-10px); }

        .menu-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 4px solid var(--primary-color);
        }

        .menu-card h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border-radius: 0.5rem;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; align-items: center; }
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Portfolio Kami</h1>
        <p>Silakan pilih profil untuk melihat detail</p>
    </header>

    <div class="container">
        <a href="raihan.html" class="menu-card">
            <img src="raihan.png" alt="Raihan">
            <h2>Raihan Fauzi</h2>
            <span class="btn">Lihat Profil</span>
        </a>

        <a href="aldi.html" class="menu-card">
            <img src="aldi.jpg" alt="Aldi">
            <h2>Aldi Alfiana</h2>
            <span class="btn">Lihat Profil</span>
        </a>
    </div>

    <footer>
        &copy; 2026 Raihan & Aldi Portfolio. All rights reserved.
    </footer>

</body>
</html>
